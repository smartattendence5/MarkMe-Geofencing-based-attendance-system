<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Subject | MarkMe</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="form-container">
    <h2>➕ Add New Subject</h2>
    <form method="POST" action="{{ url_for('add_subject') }}">
      <div class="form-group">
        <label for="subject_name">Subject Name</label>
        <input type="text" id="subject_name" name="subject_name" placeholder="Enter subject name" required>
      </div>
      <div class="form-group">
        <label for="year">Year</label>
        <input type="text" id="year" name="year" placeholder="e.g. SE, TE, BE" required>
      </div>
      <div class="form-group">
        <label for="branch">Branch</label>
        <input type="text" id="branch" name="branch" placeholder="e.g. IT, CS, ENTC" required>
      </div>

      <!-- Hidden teacher ID from session -->
      <input type="hidden" name="teacher_id" value="{{ teacher['id'] }}">

      <button type="submit" class="btn">✅ Add Subject</button>
    </form>
    <a href="{{ url_for('teacher_dashboard') }}" class="back-btn">← Back to Dashboard</a>
  </div>
</body>
</html>
