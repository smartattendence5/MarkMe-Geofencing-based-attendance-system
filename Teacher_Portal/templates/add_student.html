<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Student | MarkMe</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="form-container">
    <h2>👩‍🎓 Add New Student</h2>

    <form method="POST" action="{{ url_for('add_student') }}">
      <div class="form-group">
        <label for="name">Student Name</label>
        <input type="text" id="name" name="name" placeholder="Enter full name" required>
      </div>

      <div class="form-group">
        <label for="roll_no">Roll Number</label>
        <input type="text" id="roll_no" name="roll_no" placeholder="Enter roll number" required>
      </div>

      <div class="form-group">
        <label for="year">Year</label>
        <input type="text" id="year" name="year" placeholder="e.g. SE, TE, BE" required>
      </div>

      <div class="form-group">
        <label for="branch">Branch</label>
        <input type="text" id="branch" name="branch" placeholder="e.g. IT, CS, ENTC" required>
      </div>

      <div class="form-group">
        <label for="subject_id">Select Subject</label>
        <select id="subject_id" name="subject_id" required>
          <option value="" disabled selected>-- Choose Subject --</option>
          {% for subject in subjects %}
            <option value="{{ subject['id'] }}">{{ subject['subject_name'] }} ({{ subject['year'] }} - {{ subject['branch'] }})</option>
          {% endfor %}
        </select>
      </div>

      <button type="submit" class="btn">✅ Add Student</button>
    </form>

    <a href="{{ url_for('teacher_dashboard') }}" class="back-btn">← Back to Dashboard</a>
  </div>
</body>
</html>
