<!DOCTYPE html>
<html>
<head>
    <title>Attendance List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .present { background-color: #d4edda; color: #155724; }
        .absent { background-color: #f8d7da; color: #721c24; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
        .refresh-info { 
            background: #fff3cd; 
            padding: 10px; 
            border-radius: 5px; 
            margin: 10px 0;
        }
    </style>
</head>
<body>

<h2>Students in Classroom - Live Attendance</h2>

<div class="refresh-info">
    🔄 This page auto-refreshes every 5 seconds to show updated attendance
</div>

{% if students %}
<table>
    <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Status</th>
    </tr>

    {% for s in students %}
    <tr class="{{ 'present' if s.status == 'Present' else 'absent' }}">
        <td>{{ s.roll_no }}</td>
        <td>{{ s.name }}</td>
        <td><strong>{{ s.status }}</strong></td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>No students enrolled in this subject.</p>
{% endif %}

<script>
    // Auto-refresh every 5 seconds
    setTimeout(function() {
        location.reload();
    }, 5000);
</script>

</body>
</html>
